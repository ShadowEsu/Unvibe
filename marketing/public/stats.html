<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow, noarchive" />
  <title>Unvibe site stats</title>
  <style>
    :root {
      --bg: #f6f1ff;
      --ink: #21172f;
      --muted: #6b5f78;
      --line: #d8c9ec;
      --card: #fffdf8;
      --accent: #6f45d2;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(111, 69, 210, 0.12), transparent 40%),
        linear-gradient(180deg, #fbf8ff, var(--bg));
    }
    main { max-width: 920px; margin: 0 auto; padding: 48px 20px 80px; }
    h1 { margin: 0 0 8px; font-size: clamp(2rem, 5vw, 3rem); letter-spacing: -0.03em; }
    .lead { margin: 0 0 28px; color: var(--muted); font-family: system-ui, sans-serif; font-size: 15px; line-height: 1.5; }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      box-shadow: 8px 8px 0 rgba(111, 69, 210, 0.18);
      padding: 22px;
    }
    label { display: block; font-family: system-ui, sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; }
    input {
      width: 100%;
      min-height: 48px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      padding: 0 14px;
      font: 15px/1.4 system-ui, sans-serif;
    }
    button {
      margin-top: 14px;
      min-height: 48px;
      border: 0;
      background: var(--accent);
      color: #fff;
      font: 700 15px/1 system-ui, sans-serif;
      padding: 0 18px;
      cursor: pointer;
    }
    button:disabled { opacity: 0.6; cursor: wait; }
    .error { margin-top: 12px; color: #8a1f2b; font-family: system-ui, sans-serif; font-size: 14px; }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin: 28px 0 18px; }
    .stat {
      background: var(--card);
      border: 1px solid var(--line);
      padding: 18px;
      min-height: 140px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .stat small { font-family: system-ui, sans-serif; color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; }
    .stat strong { font-size: clamp(2rem, 4vw, 2.6rem); letter-spacing: -0.04em; }
    .stat span { font-family: system-ui, sans-serif; color: var(--muted); font-size: 13px; }
    .toolbar { display: flex; justify-content: space-between; gap: 12px; align-items: center; margin-bottom: 8px; }
    .toolbar p { margin: 0; font-family: system-ui, sans-serif; color: var(--muted); font-size: 13px; }
    .ghost { background: transparent; color: var(--accent); border: 1px solid var(--accent); margin-top: 0; }
    table { width: 100%; border-collapse: collapse; font-family: system-ui, sans-serif; font-size: 14px; }
    th, td { text-align: left; padding: 12px 10px; border-bottom: 1px solid var(--line); }
    th { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; }
    .hidden { display: none; }
    @media (max-width: 720px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <h1>Site stats</h1>
    <p class="lead">How many people are looking at Unvibe — today, this week, and all time. Same token as waitlist admin.</p>

    <section id="login" class="card">
      <label for="token">Admin token</label>
      <input id="token" type="password" autocomplete="current-password" placeholder="Paste WAITLIST_ADMIN_TOKEN" />
      <button id="open" type="button">Open stats</button>
      <p id="loginError" class="error hidden"></p>
    </section>

    <section id="dashboard" class="hidden">
      <div class="toolbar">
        <p id="updated">Loading…</p>
        <button id="refresh" class="ghost" type="button">Refresh</button>
      </div>
      <div class="grid">
        <article class="stat">
          <small>Today</small>
          <strong id="todayVisitors">—</strong>
          <span id="todayViews">— page views</span>
        </article>
        <article class="stat">
          <small>Last 7 days</small>
          <strong id="weekVisitors">—</strong>
          <span id="weekViews">— page views</span>
        </article>
        <article class="stat">
          <small>All time</small>
          <strong id="allVisitors">—</strong>
          <span id="allViews">— page views</span>
        </article>
      </div>
      <div class="card">
        <table>
          <thead>
            <tr><th>Day</th><th>Visitors</th><th>Page views</th></tr>
          </thead>
          <tbody id="days"></tbody>
        </table>
      </div>
    </section>
  </main>
  <script>
    const STORAGE_KEY = "unvibe_waitlist_admin";
    const login = document.getElementById("login");
    const dashboard = document.getElementById("dashboard");
    const tokenInput = document.getElementById("token");
    const loginError = document.getElementById("loginError");
    const daysBody = document.getElementById("days");

    function setText(id, value) {
      document.getElementById(id).textContent = value;
    }

    async function loadStats(token) {
      loginError.classList.add("hidden");
      const response = await fetch("/api/stats", {
        headers: { authorization: "Bearer " + token },
        cache: "no-store",
      });
      if (response.status === 401) throw new Error("That token is not accepted.");
      if (!response.ok) throw new Error("Could not load stats.");
      const data = await response.json();
      const s = data.stats;
      setText("todayVisitors", String(s.today.visitors));
      setText("todayViews", s.today.views + " page views · " + s.today.date + " UTC");
      setText("weekVisitors", String(s.week.visitors));
      setText("weekViews", s.week.views + " page views");
      setText("allVisitors", String(s.allTime.visitors));
      setText("allViews", s.allTime.views + " page views");
      daysBody.innerHTML = (s.recentDays || []).map(function (day) {
        return "<tr><td>" + day.date + "</td><td>" + day.visitors + "</td><td>" + day.views + "</td></tr>";
      }).join("");
      setText("updated", "Updated " + new Date().toLocaleString());
      login.classList.add("hidden");
      dashboard.classList.remove("hidden");
      try { sessionStorage.setItem(STORAGE_KEY, token); } catch (_) {}
    }

    document.getElementById("open").addEventListener("click", async function () {
      const token = tokenInput.value.trim();
      if (!token) {
        loginError.textContent = "Paste your admin token.";
        loginError.classList.remove("hidden");
        return;
      }
      try { await loadStats(token); }
      catch (err) {
        loginError.textContent = err.message || "Could not open stats.";
        loginError.classList.remove("hidden");
      }
    });

    document.getElementById("refresh").addEventListener("click", async function () {
      const token = tokenInput.value.trim() || sessionStorage.getItem(STORAGE_KEY);
      if (!token) return;
      try { await loadStats(token); }
      catch (err) { setText("updated", err.message || "Refresh failed"); }
    });

    try {
      const saved = sessionStorage.getItem(STORAGE_KEY);
      if (saved) {
        tokenInput.value = saved;
        loadStats(saved).catch(function () {});
      }
    } catch (_) {}
  </script>
</body>
</html>
